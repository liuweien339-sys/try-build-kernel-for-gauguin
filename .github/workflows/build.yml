name: 为Gauguin编译SukiSUUltra内核
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    name: 构建Gauguin内核
    steps:
      - name: 克隆内核源码
        run: |
         echo "====克隆内核源码===="
         git clone https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b gauguin-r-oss --depth=1
         echo "====克隆内核源码完成===="
         
      - name: 下载 Clang
        run: |
          echo "====下载Clang工具链===="
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r416183b.tar.gz 2>/dev/null
          echo "====创建Clang工具链解压目录===="
          mkdir ~/clang
          echo "====解压Clang工具链===="
          tar -xzf clang-r416183b.tar.gz -C ~/clang
          echo "====设置PATH调用Clang工具链===="
          export PATH="~/clang/bin:$PATH"
          echo "====给予Clang工具链权限===="
          chmod +x ~/clang/bin/*
          echo "====下载Clang工具链完成===="
          
      - name: 下载 GCC
        run: |
          echo "====下载GCC工具链===="
          wget https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/android12-release.tar.gz 2>/dev/null
          echo "====创建GCC工具链解压路径===="
          mkdir ~/gcc
          echo "====解压GCC工具链===="
          tar -xzf android12-release.tar.gz -C ~/gcc
          echo "====设置PATH调用GCC工具链===="
          export PATH="~/gcc/bin:$PATH"
          echo "====给予GCC工具链权限===="
          chmod +x ~/gcc/bin/*
          echo "====下载GCC工具链完成===="
          
      - name: 卸载系统自带Clang & 设置AOSP Clang和GCC
        run: |
         echo "====移除系统自带Clang & GCC===="
         sudo rm -f /usr/bin/clang*
         sudo rm -f /usr/bin/clang++*
         sudo rm -f /usr/bin/llvm*
         sudo rm -f /usr/bin/lld*
         sudo rm -f /usr/bin/cpp*
         sudo cp -a ~/gcc/bin/* /usr/bin
         sudo cp -a ~/clang/bin/* /usr/bin
         sudo cp -a ~/gcc/lib/gcc/aarch64-linux-android/4.9.x/include/stdarg.h /usr/include
         echo "====移除系统自带工具链 & 设置Clang & GCC完成===="
         
      - name: 下载依赖
        run: |
          echo "====下载依赖===="
          sudo apt update
          sudo apt install -y \
          git automake flex lzop bison gperf \
          build-essential zip curl zlib1g-dev \
          g++-multilib libxml2-utils bzip2 libbz2-dev \
          libbz2-1.0 libghc-bzlib-dev squashfs-tools \
          schedtool dpkg-dev liblz4-tool make \
          maven libssl-dev libswitch-perl \
          policycoreutils libxml-sax-base-perl \
          libxml-simple-perl bc libc6-dev \
          lib32ncurses-dev x11proto-core-dev \
          libx11-dev lib32z-dev libgl1-mesa-dev \
          xsltproc unzip device-tree-compiler \
          python3 python3-pip libncurses-dev \
          cpio rsync wget bc libyaml-dev \
          gcc libstdc++-12-dev
          echo "====下载依赖完成===="
         
      - name: 增加 SukiSUUltra 支持
        run: |
          echo "====给予内核SukiSUUltra支持===="
          wget https://github.com/SukiSU-Ultra/SukiSU-Ultra/raw/refs/heads/main/kernel/setup.sh
          cd ${{ github.workspace }}/and
          sh ${{ github.workspace }}/setup.sh ${{ github.workspace }}/Xiaomi_Kernel_OpenSource
          echo "====给予内核SukiSUUltra支持完成===="
          
      - name: 构建内核
        run: |
          echo "====构建内核===="
          cd ${{ github.workspace }}/Xiaomi_Kernel_OpenSource
          export ARCH=arm64
          export SUBARCH=arm64
          make defconfig
          make ARCH=arm64 \
               CC=clang \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               CROSS_COMPILE=aarch64-linux-android- \
               -j$(nproc --all) \
               2>&1 | tee build.log
          
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "构建失败"
            echo "==========日志=========="
            tail -50 build.log
            echo "==========日志=========="
            exit 1
          fi
          
          echo "构建成功"
          ls -la /arch/arm64/boot/

      - name: 获取编译结果
        run: |
          mkdir -p artifacts
          
          cd ${{ github.workspace }}/Xiaomi_Kernel_OpenSource
          
          # Copy all possible kernel images
          for img in Image Image.gz Image.gz-dtb; do
            if [ -f /arch/arm64/boot/$img ]; then
              cp /arch/arm64/boot/$img artifacts/
              echo "Found $img"
            fi
          done
          
          # Copy DTB files
          if [ -d out/arch/arm64/boot/dts ]; then
            find /arch/arm64/boot/dts -name "*.dtb" -exec cp {} artifacts/ \;
          fi
          
          # Copy DTBO if exists
          [ -f /arch/arm64/boot/dtbo.img ] && cp out/arch/arm64/boot/dtbo.img artifacts/
          
          # Copy modules if any
          find out -name "*.ko" -exec cp {} artifacts/ \; 2>/dev/null || true
          
          echo "Artifacts:"
          ls -la artifacts/

      - name: 创建 AnyKernel3 刷机包
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          
          cd AnyKernel3
          
          # Copy kernel image
          cp ../artifacts/Image* . 2>/dev/null || true
          
          # Copy dtb files
          cp ../artifacts/*.dtb . 2>/dev/null || true
          
          # Copy dtbo
          cp ../artifacts/dtbo.img . 2>/dev/null || true
          
          # Remove git files and create zip
          rm -rf .git
          ZIP_NAME="SukiSUItra-Kernel-gauguin-$(date +%Y%m%d-%H%M).zip"
          zip -r9 ../$ZIP_NAME * -x README.md LICENSE
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "Created $ZIP_NAME"

      - name: 上传编译结果
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SukiSUItra-Kernel-Flashable
          path: SukiSUItra-Kernel-*.zip

      - name: 上传编译日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: ${{ github.workspace }}/android_kernel_xiaomi_gauguin/build.log

      - name: 构建结果
        if: always()
        run: |
          echo "========================================="
          echo "        构建结果                    "
          echo "========================================="
          echo "状态: ${{ job.status }}"
          echo "========================================="
          
          if [ -f ${{ github.workspace }}/kernel/build.log ]; then
            echo "日志:"
            tail -30 ${{ github.workspace }}/kernel/build.log
          fi
          
          if [ -f SukiSUItra-Kernel-*.zip ]; then
            echo ""
            echo "📦 刷机文件: ${{ env.ZIP_NAME }}"
            ls -lh SukiSUItra-Kernel-*.zip
          fi
