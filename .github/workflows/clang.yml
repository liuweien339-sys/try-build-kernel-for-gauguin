name: Build AOSP Clang for ARM64 Android
on:
  workflow_dispatch:

jobs:
  build-clang:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout llvm-project
      uses: actions/checkout@v4
      with:
        repository: https://android.googlesource.com/toolchain/llvm-project
        ref: mirror-goog-llvm-r563880-release
        path: llvm-project
        fetch-depth: 1

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake python3
        # 安装 ARM64 Android 的交叉编译器和库
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        # 如果要编译运行于 ARM64 Linux 的 Clang（而非 Android），还需要：
        # sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

    - name: Configure CMake (Cross-compile for ARM64 Android)
      run: |
        mkdir -p build && cd build
        cmake -G Ninja ../llvm-project/llvm \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_SYSTEM_VERSION=29 \
          -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
          -DCMAKE_ANDROID_NDK=/path/to/ndk \ # 需要提供NDK路径，或用下面2行代替
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DLLVM_ENABLE_PROJECTS="clang;lld" \
          -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
          -DLLVM_DEFAULT_TARGET_TRIPLE="aarch64-linux-android" \
          -DLLVM_APPEND_VC_REV=OFF \
          -DLLVM_INCLUDE_TESTS=OFF \
          -DCLANG_VENDOR=" (based on r563880)"

    - name: Build
      run: |
        cd build
        ninja clang lld -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aosp-clang-android-arm64
        path: |
          build/bin/clang
          build/bin/clang++
          build/bin/lld
          build/bin/ld.lld
          build/lib/clang/
        retention-days: 7
