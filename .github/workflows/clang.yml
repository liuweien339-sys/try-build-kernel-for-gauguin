name: Build AOSP Clang

on:
  workflow_dispatch:

jobs:
  build-aosp-clang:
    runs-on: ubuntu-latest
    steps:
      - name: Download source tarball
        run: |
          wget https://android.googlesource.com/toolchain/llvm-project/+archive/refs/heads/mirror-goog-llvm-r563880-release.tar.gz
          
      - name: Extract source
        run: |
          mkdir llvm
          tar -xzf mirror-goog-llvm-r563880-release.tar.gz -C llvm
          ls -la llvm/

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake -G Ninja ../llvm \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang;lld" \
          -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
          -DLLVM_DEFAULT_TARGET_TRIPLE="aarch64-linux-android" \
          -DLLVM_APPEND_VC_REV=OFF \ 
          -DPACKAGE_VERSION="21.0.0" \
          -DCLANG_VENDOR=" (based on r563880)" \
          -DLLVM_INCLUDE_TESTS=OFF
  
      - name: Build
        run: |
          cd build
          ninja clang lld -j$(nproc)

      - name: Test binary
        run: |
          cd build
          file bin/clang

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aosp-clang-arm64
          path: |
            build/bin/clang
            build/bin/clang++
            build/bin/lld
            build/bin/ld.lld
            build/lib/clang/
          retention-days: 7
