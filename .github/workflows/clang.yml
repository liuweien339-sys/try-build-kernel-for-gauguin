name: Build AOSP Clang

on:
  workflow_dispatch:

jobs:
  build-aosp-clang:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Download source tarball
        run: |
          # 直接用 wget 下载 Google 的压缩包
          wget https://android.googlesource.com/toolchain/llvm-project/+archive/refs/heads/mirror-goog-llvm-r563880-release.tar.gz
          
      - name: Extract source
        run: |
          mkdir llvm-project
          # 解压到 llvm-project 目录
          tar -xzf mirror-goog-llvm-r563880-release.tar.gz -C llvm-project
          # 验证解压内容
          ls -la llvm-project/
          # 关键：检查是否有 CMakeLists.txt
          find llvm-project -name "CMakeLists.txt" | head -5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure CMake
        run: |
          mkdir build && cd build
          # 注意：源码可能在 llvm-project/llvm 子目录
          # 需要先确认正确的路径
          if [ -f "../llvm-project/llvm/CMakeLists.txt" ]; then
            CMAKE_SRC="../llvm-project/llvm"
          else
            CMAKE_SRC="../llvm-project"
          fi
          echo "Using CMake source: $CMAKE_SRC"
          
          cmake -G Ninja $CMAKE_SRC \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
            -DLLVM_DEFAULT_TARGET_TRIPLE="aarch64-linux-android" \
            -DLLVM_APPEND_VC_REV=OFF \
            -DPACKAGE_VERSION="21.0.0" \
            -DCLANG_VENDOR=" (based on r563880)" \
            -DLLVM_INCLUDE_TESTS=OFF

      - name: Build
        run: |
          cd build
          ninja clang lld -j$(nproc)

      - name: Test binary
        run: |
          cd build
          file bin/clang
          bin/clang --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aosp-clang
          path: |
            build/bin/clang
            build/bin/clang++
            build/bin/lld
            build/bin/ld.lld
            build/lib/clang/
          retention-days: 7
